# SPDX-License-Identifier: Apache-2.0

name: Rule Executer - Rule processor Automation

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build and Publish Package"]
    types:
      - completed

jobs:
  automate-rule-executer:
    if: |
      github.actor != 'dependabot[bot]' && 
      github.actor != 'dependabot-preview[bot]' &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    runs-on:
    - tazama-dev
    env:
      RULE_NAME: ${{ github.event.repository.name }}
      ORG: ${{ github.repository_owner }}
      # Docker Hub org namespace — repos will be created as pslcopilot/<rule-name>
      DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}

    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20 (GitHub Packages)
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      # Step 2: Clone Rule Executer Repo and delete package-lock.json file
      - name: Clone Rule Executer Repo
        run: |
          echo "Cloning Rule Executer repo and removing package-lock.json file..."
          git clone https://github.com/tazama-lf/rule-executer -b feat-paysys
          cd rule-executer 
          rm -f package-lock.json
          cd ..
          echo "Clone completed."
        env:
          GH_TOKEN: ${{ secrets.TAZAMA_TOKEN }}

      # Step 3: Duplicate Rule Executer Folder to 'rule-executer-$RULE_NAME'
      - name: Duplicate Rule Executer Folder
        run: |
          echo "Duplicating Rule Executer folder to rule-executer-$RULE_NAME..."
          cp -R rule-executer rule-executer-$RULE_NAME
          echo "Rule Executer folder duplicated."

      # Step 4: Normalize rule name
      - name: Normalize rule name
        run: |
          RULE_ID="${RULE_NAME#rule-}"
          echo "RULE_ID=$RULE_ID" >> $GITHUB_ENV
          echo "Normalized RULE_ID=$RULE_ID"

      - name: Modify Rule Executer Files
        run: |
          echo "Modifying rule-executer-$RULE_NAME files..."

          sed -E -i 's|"rule": "npm:@[^/]+/rule-placeholder@latest"|"rule": "npm:@'"$ORG"'/'"$RULE_NAME"'@latest"|g' rule-executer-$RULE_NAME/package.json

          sed -i "s/placeholder/$RULE_ID/" rule-executer-$RULE_NAME/Dockerfile

          sed -i '/^FROM node/a\ARG GH_TOKEN' rule-executer-$RULE_NAME/Dockerfile

          # Replace RUN npm ci with npm auth + npm ci
          sed -i 's|^[[:space:]]*RUN npm ci.*|RUN echo "@tazama-lf:registry=https://npm.pkg.github.com" > /root/.npmrc \&\& \\ \
            echo "@'"$ORG"':registry=https://npm.pkg.github.com" >> /root/.npmrc \&\& \\ \
            echo "//npm.pkg.github.com/:_authToken=${GH_TOKEN}" >> /root/.npmrc \&\& \\ \
            npm ci --ignore-scripts|' rule-executer-$RULE_NAME/Dockerfile

          echo "Successfully modified rule-executer-$RULE_NAME files."

      # Verify Changes in modified files
      - name: Verify Changes
        run: |
          cat rule-executer-$RULE_NAME/package.json
          cat rule-executer-$RULE_NAME/Dockerfile

      # Configure npm for GitHub Packages
      - name: Configure npm for GitHub Packages
        run: |
          export NPMRC_PATH="$HOME/.npmrc"
          echo "@tazama-lf:registry=https://npm.pkg.github.com" >> "$NPMRC_PATH"
          echo "@$ORG:registry=https://npm.pkg.github.com" >> "$NPMRC_PATH"
          echo "//npm.pkg.github.com/:_authToken=${GH_TOKEN}" >> "$NPMRC_PATH"

          echo "=== ACTIVE npmrc ==="
          cat "$NPMRC_PATH"
        env:
          GH_TOKEN: ${{ secrets.TAZAMA_TOKEN }}

      - name: Generate package-lock.json for Docker build
        run: |
          export NPM_CONFIG_USERCONFIG="$HOME/.npmrc"
          cd rule-executer-$RULE_NAME
          npm install --ignore-scripts --package-lock-only
        env:
          GH_TOKEN: ${{ secrets.TAZAMA_TOKEN }}

      - name: Install Latest Rule Version
        run: |
          cd rule-executer-$RULE_NAME
          npm pkg delete dependencies.rule
          npm install --save-exact rule@npm:@$ORG/$RULE_NAME@latest --ignore-scripts
          echo "✅ Installed: $(npm list rule --depth=0)"
        env:
          GH_TOKEN: ${{ secrets.TAZAMA_TOKEN }}

      - name: Extract Rule Version
        run: |
          cd rule-executer-$RULE_NAME
          RULE_VERSION=$(node -p "require('./node_modules/rule/package.json').version")
          echo "RULE_VERSION=$RULE_VERSION" >> $GITHUB_ENV
          echo "Detected RULE_VERSION=$RULE_VERSION"

      # Step 5: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 6: Create Docker Hub repository at runtime (idempotent — safe to re-run)
      # Repo name format: pslcopilot/<RULE_NAME>  e.g. pslcopilot/rule-001
      - name: Create Docker Hub Repository
        run: |
          DOCKERHUB_REPO="${DOCKERHUB_NAMESPACE}/${RULE_NAME}"
          echo "DOCKERHUB_REPO=${DOCKERHUB_REPO}" >> $GITHUB_ENV

          echo "Checking / creating Docker Hub repository: ${DOCKERHUB_REPO}..."

          # Get a short-lived JWT — login is with personal username, namespace is the org
          HUB_JWT=$(curl -s -X POST "https://hub.docker.com/v2/users/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${{ secrets.DOCKERHUB_USERNAME }}\",\"password\":\"${{ secrets.DOCKERHUB_TOKEN }}\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")

          if [ -z "$HUB_JWT" ]; then
            echo "❌ Failed to authenticate with Docker Hub — check DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets"
            exit 1
          fi

          echo "✅ Docker Hub login successful"

          # Create the repo under the org namespace
          # 201 = created, 409 = already exists — both are fine
          HTTP_STATUS=$(curl -s -o /tmp/hub_response.json -w "%{http_code}" \
            -X POST "https://hub.docker.com/v2/repositories/" \
            -H "Authorization: Bearer ${HUB_JWT}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"${RULE_NAME}\",
              \"namespace\": \"${DOCKERHUB_NAMESPACE}\",
              \"description\": \"Rule executer image for ${RULE_NAME}\",
              \"is_private\": false
            }")

          cat /tmp/hub_response.json

          if [ "$HTTP_STATUS" = "201" ]; then
            echo "✅ Docker Hub repository created: ${DOCKERHUB_REPO}"
          elif [ "$HTTP_STATUS" = "409" ] || [ "$HTTP_STATUS" = "400" ]; then
            echo "✅ Docker Hub repository already exists: ${DOCKERHUB_REPO}"
          else
            echo "❌ Unexpected status ${HTTP_STATUS} when creating repository"
            exit 1
          fi

      # Step 7: Build and push Docker image to Docker Hub
      - name: Build and Push Docker Image to Docker Hub
        run: |
          IMAGE_TAG_VERSIONED="${DOCKERHUB_REPO}:${RULE_VERSION}"
          IMAGE_TAG_LATEST="${DOCKERHUB_REPO}:latest"

          echo "Building Docker image..."
          docker build \
            --build-arg GH_TOKEN=${GH_TOKEN} \
            -t "${IMAGE_TAG_VERSIONED}" \
            -t "${IMAGE_TAG_LATEST}" \
            rule-executer-$RULE_NAME

          echo "Pushing ${IMAGE_TAG_VERSIONED}..."
          docker push "${IMAGE_TAG_VERSIONED}"

          echo "Pushing ${IMAGE_TAG_LATEST}..."
          docker push "${IMAGE_TAG_LATEST}"

          echo "IMAGE_TAG_LATEST=${IMAGE_TAG_LATEST}" >> $GITHUB_ENV

          echo "✅ Docker image pushed to Docker Hub."
        env:
          GH_TOKEN: ${{ secrets.TAZAMA_TOKEN }}

      # Step 8: Pull from Docker Hub and Deploy Container on self-hosted runner
      - name: Pull and Deploy Container from Docker Hub
        run: |
          echo "Pulling latest image from Docker Hub..."
          docker pull "${IMAGE_TAG_LATEST}"

          echo "Stopping and removing existing container if running..."
          docker stop $RULE_NAME || true
          docker rm $RULE_NAME || true

          echo "Deploying container from Docker Hub image..."
          docker run -d --name $RULE_NAME \
          -e RULE_NAME=$RULE_ID \
          -e RULE_VERSION=$RULE_VERSION \
          -e RAW_HISTORY_DATABASE=raw_history \
          -e RAW_HISTORY_DATABASE_HOST=10.10.80.37 \
          -e RAW_HISTORY_DATABASE_PORT=5432 \
          -e RAW_HISTORY_DATABASE_USER=postgres \
          -e RAW_HISTORY_DATABASE_PASSWORD=postgres \
          -e RAW_HISTORY_DATABASE_CERT_PATH=/usr/local/share/ca-certificates/ca-certificates.crt \
          -e CONFIGURATION_DATABASE=configuration \
          -e CONFIGURATION_DATABASE_HOST=10.10.80.37 \
          -e CONFIGURATION_DATABASE_PORT=5432 \
          -e CONFIGURATION_DATABASE_USER=postgres \
          -e CONFIGURATION_DATABASE_PASSWORD=postgres \
          -e CONFIGURATION_DATABASE_CERT_PATH=/usr/local/share/ca-certificates/ca-certificates.crt \
          -e EVENT_HISTORY_DATABASE=event_history \
          -e EVENT_HISTORY_DATABASE_HOST=10.10.80.37 \
          -e EVENT_HISTORY_DATABASE_PORT=5432 \
          -e EVENT_HISTORY_DATABASE_USER=postgres \
          -e EVENT_HISTORY_DATABASE_PASSWORD=postgres \
          -e EVENT_HISTORY_DATABASE_CERT_PATH=/usr/local/share/ca-certificates/ca-certificates.crt \
          -e STARTUP_TYPE=nats \
          -e SERVER_URL=10.10.80.37:14222 \
          -e PRODUCER_STREAM= \
          -e CONSUMER_STREAM= \
          -e STREAM_SUBJECT= \
          -e ACK_POLICY=Explicit \
          -e PRODUCER_STORAGE=File \
          -e PRODUCER_RETENTION_POLICY=Workqueue \
          -e REDIS_HOST="10.10.80.37" \
          -e REDIS_PORT="6379" \
          -e REDIS_PASSWORD="redis-password" \
          -e REDIS_AUTH= \
          --restart unless-stopped "${IMAGE_TAG_LATEST}"

          echo "✅ Container deployed successfully from Docker Hub."